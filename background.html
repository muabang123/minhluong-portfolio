<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f0f4ff;
    font-family: 'Courier New', monospace;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* Floating code words */
  .code-word {
    position: fixed;
    z-index: 2;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    animation: fadeUpWord var(--dur, 8s) ease-in-out var(--delay, 0s) infinite;
    white-space: nowrap;
    font-size: var(--fs, 0.85rem);
  }

  @keyframes fadeUpWord {
    0%   { opacity: 0;    transform: translateY(30px); }
    15%  { opacity: 0.55; transform: translateY(0); }
    80%  { opacity: 0.45; transform: translateY(-20px); }
    100% { opacity: 0;    transform: translateY(-40px); }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="words"></div>

<script>
/* ── CANVAS: soft floating dots + connections ── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Very few particles → light on CPU
const DOTS = 38;
const dots = Array.from({length: DOTS}, () => ({
  x:  Math.random() * 1400,
  y:  Math.random() * 900,
  vx: (Math.random() - 0.5) * 0.3,
  vy: (Math.random() - 0.5) * 0.3,
  r:  Math.random() * 2.5 + 1
}));

// Soft blue-teal palette that suits a white page
const PALETTE = ['#4f86c6', '#5ba4cf', '#34a0a4', '#48cae4', '#90caf9'];

function draw() {
  // Soft gradient background — light sky blue → white
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0,   '#e8f0fe');
  grad.addColorStop(0.5, '#f0f7ff');
  grad.addColorStop(1,   '#e3f2fd');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Connection lines (only short ones)
  for (let i = 0; i < dots.length; i++) {
    for (let j = i + 1; j < dots.length; j++) {
      const dx = dots[i].x - dots[j].x;
      const dy = dots[i].y - dots[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 150) {
        ctx.save();
        ctx.globalAlpha = (1 - d/150) * 0.18;
        ctx.strokeStyle = '#4f86c6';
        ctx.lineWidth   = 1;
        ctx.beginPath();
        ctx.moveTo(dots[i].x, dots[i].y);
        ctx.lineTo(dots[j].x, dots[j].y);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  // Dots
  dots.forEach((p, i) => {
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle   = PALETTE[i % PALETTE.length];
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
  });

  requestAnimationFrame(draw);
}
draw();


/* ── FLOATING CODE WORDS ── */
const WORDS = [
  { text: 'const',       color: '#1565c0' },
  { text: 'async/await', color: '#2e7d32' },
  { text: 'import React',color: '#1565c0' },
  { text: '{ }',         color: '#6a1b9a' },
  { text: 'SELECT *',    color: '#e65100' },
  { text: 'git push',    color: '#bf360c' },
  { text: 'npm start',   color: '#2e7d32' },
  { text: 'useState()',  color: '#0277bd' },
  { text: 'return <>',   color: '#1565c0' },
  { text: 'docker run',  color: '#0288d1' },
  { text: 'for (let i)', color: '#4527a0' },
  { text: 'try { }',     color: '#c62828' },
  { text: 'JOIN ON',     color: '#e65100' },
  { text: '.then()',     color: '#2e7d32' },
  { text: '=>',          color: '#6a1b9a' },
];

// Spread positions across screen, avoid center (where content is)
const POSITIONS = [
  { left:'3%',  top:'12%' }, { left:'88%', top:'8%'  },
  { left:'5%',  top:'40%' }, { left:'85%', top:'35%' },
  { left:'2%',  top:'70%' }, { left:'87%', top:'65%' },
  { left:'6%',  top:'85%' }, { left:'84%', top:'82%' },
  { left:'20%', top:'5%'  }, { left:'70%', top:'4%'  },
  { left:'18%', top:'92%' }, { left:'68%', top:'90%' },
  { left:'4%',  top:'55%' }, { left:'86%', top:'50%' },
  { left:'10%', top:'25%' },
];

const wrap = document.getElementById('words');
WORDS.forEach((w, i) => {
  const el = document.createElement('div');
  el.className  = 'code-word';
  el.textContent = w.text;
  el.style.color = w.color;
  el.style.setProperty('--dur',   (7 + (i % 4) * 1.5) + 's');
  el.style.setProperty('--delay', (i * 0.9)            + 's');
  el.style.setProperty('--fs',    (i % 3 === 0 ? '0.95rem' : '0.82rem'));
  const pos = POSITIONS[i % POSITIONS.length];
  Object.assign(el.style, pos);
  wrap.appendChild(el);
});
</script>
</body>
</html>

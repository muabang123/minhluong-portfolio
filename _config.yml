  <style>
  /* 1. Ẩn các nút mặc định của theme */
  header p.view, header ul { display: none !important; }

  /* 2. LOGO ANIMATION - VIỀN XOAY CYBERPUNK */
  header > img, 
  header > a > img {
    border-radius: 50% !important;
    width: 240px !important;
    height: 240px !important;
    object-fit: cover !important;
    margin-bottom: 20px !important;
    display: block !important;
    margin-left: auto !important;
    margin-right: auto !important;
    
    /* Tạo khoảng hở cho viền */
    padding: 6px; 
    
    /* Hiệu ứng màu gradient xoay */
    background: linear-gradient(45deg, #00d2ff, #3a7bd5, #ff007f, #00d2ff);
    background-size: 300% 300%;
    
    /* Hiệu ứng đổ bóng phát sáng (Glow) */
    box-shadow: 0 0 15px rgba(58, 123, 213, 0.5);
    
    /* Kích hoạt animation */
    animation: borderRotate 4s ease infinite, pulseGlow 2s ease-in-out infinite alternate;
  }

  /* Định nghĩa hiệu ứng xoay màu viền */
  @keyframes borderRotate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Định nghĩa hiệu ứng hào quang nhịp thở */
  @keyframes pulseGlow {
    from { box-shadow: 0 0 10px rgba(58, 123, 213, 0.4); transform: scale(1); }
    to { box-shadow: 0 0 25px rgba(0, 210, 255, 0.8); transform: scale(1.02); }
  }

  /* 3. Đảm bảo các Badge KHÔNG bị dính style trên */
  .portfolio-scroll img {
    border-radius: 0 !important;
    width: auto !important;
    height: auto !important;
    margin-bottom: 0 !important;
    display: inline-block !important;
    padding: 0 !important;
    background: none !important;
    animation: none !important;
    box-shadow: none !important;
  }

  /* 4. Chỉnh tên (h1) */
  header h1 {
    font-size: 1.4em !important;
    white-space: nowrap !important;
    text-align: center !important;
    margin-top: 10px !important;
  }

  /* 5. Vùng cuộn */
  .portfolio-scroll {
    max-height: 65vh;
    overflow-y: auto;
    padding-right: 5px;
  }
</style>


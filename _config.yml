title: LUONG CHUOC MINH
theme: jekyll-theme-minimal
logo: "/images/logo.jpg?raw=true"

description: |
  <style>
    /* 1. Ẩn các nút mặc định của theme */
    header p.view, header ul { display: none !important; }

    /* 2. LOGO ANIMATION - VIỀN XOAY CYBERPUNK */
    header > img, 
    header > a > img {
      border-radius: 50% !important;
      width: 220px !important;
      height: 220px !important;
      object-fit: cover !important;
      margin-bottom: 25px !important;
      display: block !important;
      margin-left: auto !important;
      margin-right: auto !important;
      
      /* Tạo khoảng hở cho viền */
      padding: 5px; 
      
      /* Màu sắc viền: Xanh Cyan - Tím - Cam Neon */
      background: linear-gradient(var(--angle, 0deg), #00f2fe, #764ba2, #ff007f, #00f2fe);
      
      /* Đổ bóng phát sáng đa tầng */
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.4), 
                  0 0 30px rgba(118, 75, 162, 0.2);
      
      /* Chạy animation */
      animation: rotateGradient 4s linear infinite, breathe 3s ease-in-out infinite alternate;
    }

    /* Hiệu ứng xoay màu viền (Sử dụng CSS Variables để mượt hơn) */
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes rotateGradient {
      to { --angle: 360deg; }
    }

    /* Hiệu ứng nhịp thở cho Logo */
    @keyframes breathe {
      from { transform: scale(1); filter: brightness(1); }
      to { transform: scale(1.03); filter: brightness(1.1); box-shadow: 0 0 25px rgba(255, 0, 127, 0.6); }
    }

    /* 3. Reset style cho các Badge (quan trọng) */
    .portfolio-scroll img {
      border-radius: 0 !important;
      width: auto !important;
      height: auto !important;
      margin: 0 !important;
      display: inline-block !important;
      padding: 0 !important;
      background: none !important;
      animation: none !important;
      box-shadow: none !important;
    }

    /* 4. Chỉnh tên (h1) */
    header h1 {
      font-size: 1.5em !important;
      letter-spacing: 1px;
      text-align: center !important;
      margin-top: 15px !important;
      color: #333;
    }

    /* 5. Vùng cuộn */
    .portfolio-scroll {
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 10px;
    }

    /* Custom Scrollbar cho ngầu */
    .portfolio-scroll::-webkit-scrollbar { width: 4px; }
    .portfolio-scroll::-webkit-scrollbar-thumb { background: #764ba2; border-radius: 10px; }
  </style>

